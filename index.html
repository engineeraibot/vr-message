<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <title>VR Message Panel</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands/hands.js" crossorigin="anonymous"></script>
    <style>
        body { margin:0; overflow:hidden; background:#000; font-family:sans-serif; }
        #enterVR {
            position:fixed;
            top:50%;
            left:50%;
            transform:translate(-50%,-50%);
            padding:20px 30px;
            font-size:20px;
            border:none;
            border-radius:12px;
            background:#007bff;
            color:white;
            z-index:10;
            cursor:pointer;
            box-shadow: 0 4px 15px rgba(0,0,0,0.5);
        }
    </style>
</head>
<body>

<button id="enterVR">Enter VR</button>
<video id="handVideo" style="display:none;" playsinline></video>

<script type="importmap">
  {
    "imports": {
      "three": "https://cdn.jsdelivr.net/npm/three@0.160/build/three.module.js",
      "three/examples/jsm/": "https://cdn.jsdelivr.net/npm/three@0.160/examples/jsm/"
    }
  }
</script>

<script type="module">
import * as THREE from 'three';
import { VRButton } from 'three/examples/jsm/webxr/VRButton.js';

let scene, camera, renderer, cameraRig;
let hands;
let handMarkers = [];
let handBones = [];
let videoTexture;
let messagePanel, leftArrow, rightArrow, textMesh;
let currentIndex = 0;
const messages = ['hello', 'world', 'welcome', 'to', 'vr'];
let lastInteractionTime = 0;

const HAND_CONNECTIONS = [
    [0, 1], [1, 2], [2, 3], [3, 4],       // Thumb
    [0, 5], [5, 6], [6, 7], [7, 8],       // Index
    [0, 9], [9, 10], [10, 11], [11, 12],  // Middle
    [0, 13], [13, 14], [14, 15], [15, 16],// Ring
    [0, 17], [17, 18], [18, 19], [19, 20],// Pinky
    [5, 9], [9, 13], [13, 17]             // Palm
];

initHandTracking();
init();

function initHandTracking() {
    // @ts-ignore
    hands = new window.Hands({locateFile: (file) => {
        return `https://cdn.jsdelivr.net/npm/@mediapipe/hands/${file}`;
    }});
    hands.setOptions({
        maxNumHands: 2,
        modelComplexity: 1,
        minDetectionConfidence: 0.5,
        minTrackingConfidence: 0.5
    });
    hands.onResults(onHandResults);

    const videoElement = document.getElementById('handVideo');
    navigator.mediaDevices.getUserMedia({
        video: { facingMode: 'environment', width: 640, height: 480 }
    }).then(stream => {
        videoElement.srcObject = stream;
        videoElement.play();
        requestAnimationFrame(processVideoFrame);
    }).catch(err => {
        console.error("Camera access error:", err);
    });
}

async function processVideoFrame() {
    const videoElement = document.getElementById('handVideo');
    if (videoElement.readyState === videoElement.HAVE_ENOUGH_DATA) {
        await hands.send({image: videoElement});
    }
    requestAnimationFrame(processVideoFrame);
}

function onHandResults(results) {
    // Hide markers and bones
    for (let h = 0; h < 2; h++) {
        if (handMarkers[h]) handMarkers[h].forEach(m => m.visible = false);
        if (handBones[h]) handBones[h].forEach(b => b.visible = false);
    }

    if (results.multiHandLandmarks) {
        for (let h = 0; h < results.multiHandLandmarks.length; h++) {
            if (h >= 2) break;
            const landmarks = results.multiHandLandmarks[h];
            const points = [];
            for (let i = 0; i < 21; i++) {
                const l = landmarks[i];
                // Project into VR space relative to camera
                const p = new THREE.Vector3(
                    (l.x - 0.5) * 2.0,
                    (0.5 - l.y) * 1.5,
                    -l.z * 2.0 - 0.6
                );
                points.push(p);
                handMarkers[h][i].position.copy(p);
                handMarkers[h][i].visible = true;
            }

            for (let i = 0; i < HAND_CONNECTIONS.length; i++) {
                const conn = HAND_CONNECTIONS[i];
                updateBone(handBones[h][i], points[conn[0]], points[conn[1]]);
            }
        }
    }
}

function updateBone(bone, p1, p2) {
    const dir = new THREE.Vector3().subVectors(p2, p1);
    const length = dir.length();
    if (length < 0.001) return;
    bone.position.copy(p1).addScaledVector(dir, 0.5);
    bone.quaternion.setFromUnitVectors(new THREE.Vector3(0, 1, 0), dir.clone().normalize());
    bone.scale.set(1, length, 1);
    bone.visible = true;
}

function init() {
    scene = new THREE.Scene();
    camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);

    cameraRig = new THREE.Group();
    cameraRig.add(camera);
    scene.add(cameraRig);

    renderer = new THREE.WebGLRenderer({ antialias: true });
    renderer.setPixelRatio(window.devicePixelRatio);
    renderer.setSize(window.innerWidth, window.innerHeight);
    renderer.xr.enabled = true;
    document.body.appendChild(renderer.domElement);

    // Camera feed background
    const videoElement = document.getElementById('handVideo');
    videoTexture = new THREE.VideoTexture(videoElement);
    const bgPlane = new THREE.Mesh(
        new THREE.PlaneGeometry(4, 3),
        new THREE.MeshBasicMaterial({ map: videoTexture })
    );
    bgPlane.position.z = -2;
    camera.add(bgPlane);

    createMessagePanel();

    // Hand Visuals
    for (let h = 0; h < 2; h++) {
        const markers = [];
        for (let i = 0; i < 21; i++) {
            const sphere = new THREE.Mesh(
                new THREE.SphereGeometry(0.015, 8, 8),
                new THREE.MeshBasicMaterial({ color: 0xff0000 })
            );
            sphere.visible = false;
            camera.add(sphere);
            markers.push(sphere);
        }
        handMarkers.push(markers);

        const bones = [];
        for (let i = 0; i < HAND_CONNECTIONS.length; i++) {
            const bone = new THREE.Mesh(
                new THREE.CylinderGeometry(0.005, 0.005, 1, 8),
                new THREE.MeshBasicMaterial({ color: 0x00ff00 })
            );
            bone.visible = false;
            camera.add(bone);
            bones.push(bone);
        }
        handBones.push(bones);
    }

    const vrButton = VRButton.createButton(renderer);
    vrButton.style.display = 'none';
    document.body.appendChild(vrButton);

    document.getElementById('enterVR').onclick = () => {
        vrButton.click();
        document.getElementById('enterVR').style.display = 'none';
    };

    window.addEventListener('resize', onResize);
    renderer.setAnimationLoop(animate);
}

function createMessagePanel() {
    messagePanel = new THREE.Group();
    messagePanel.position.set(0, 0, -1);
    camera.add(messagePanel);

    const bg = new THREE.Mesh(
        new THREE.PlaneGeometry(1, 0.5),
        new THREE.MeshBasicMaterial({ color: 0x222222, transparent: true, opacity: 0.6 })
    );
    messagePanel.add(bg);

    const canvas = document.createElement('canvas');
    canvas.width = 512;
    canvas.height = 256;
    const texture = new THREE.CanvasTexture(canvas);
    textMesh = new THREE.Mesh(
        new THREE.PlaneGeometry(0.8, 0.4),
        new THREE.MeshBasicMaterial({ map: texture, transparent: true })
    );
    textMesh.position.z = 0.01;
    messagePanel.add(textMesh);
    updateText();

    const arrowGeo = new THREE.ConeGeometry(0.05, 0.1, 4);

    leftArrow = new THREE.Mesh(arrowGeo, new THREE.MeshBasicMaterial({ color: 0x00ff00 }));
    leftArrow.rotation.z = Math.PI / 2;
    leftArrow.position.set(-0.6, 0, 0);
    messagePanel.add(leftArrow);

    rightArrow = new THREE.Mesh(arrowGeo, new THREE.MeshBasicMaterial({ color: 0x00ff00 }));
    rightArrow.rotation.z = -Math.PI / 2;
    rightArrow.position.set(0.6, 0, 0);
    messagePanel.add(rightArrow);
}

function updateText() {
    const canvas = textMesh.material.map.image;
    const ctx = canvas.getContext('2d');
    ctx.clearRect(0, 0, canvas.width, canvas.height);
    ctx.fillStyle = 'white';
    ctx.font = 'bold 80px Arial';
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    ctx.fillText(messages[currentIndex], canvas.width / 2, canvas.height / 2);
    textMesh.material.map.needsUpdate = true;
}

function animate() {
    const now = Date.now();
    if (now - lastInteractionTime > 500) {
        for (let h = 0; h < 2; h++) {
            if (handMarkers[h] && handMarkers[h][8].visible) {
                const tipPos = new THREE.Vector3();
                handMarkers[h][8].getWorldPosition(tipPos);

                const leftPos = new THREE.Vector3();
                leftArrow.getWorldPosition(leftPos);
                if (tipPos.distanceTo(leftPos) < 0.15) {
                    currentIndex = (currentIndex - 1 + messages.length) % messages.length;
                    updateText();
                    lastInteractionTime = now;
                }

                const rightPos = new THREE.Vector3();
                rightArrow.getWorldPosition(rightPos);
                if (tipPos.distanceTo(rightPos) < 0.15) {
                    currentIndex = (currentIndex + 1) % messages.length;
                    updateText();
                    lastInteractionTime = now;
                }
            }
        }
    }
    renderer.render(scene, camera);
}

function onResize() {
    camera.aspect = window.innerWidth / window.innerHeight;
    camera.updateProjectionMatrix();
    renderer.setSize(window.innerWidth, window.innerHeight);
}
</script>

</body>
</html>
